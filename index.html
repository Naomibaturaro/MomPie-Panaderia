<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panadería MomPie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>MomPie Panadería</h1>
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#productos">Productos</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<section class="hero">
    <img src="images/panaderia.jpg" alt="Panadería MomPie">
</section>

<section id="productos">
    <h2>Productos</h2>
    <div class="products">
        <div>
            <img src="images/torta-chocolate.jpg" alt="Torta de Chocolate" class="torta-chocolate">
            <p>Torta de Chocolate</p>
        </div>
        <div>
            <img src="images/cheesecake.jpg" alt="Cheesecake" class="cheesecake">
            <p>Cheesecake</p>
        </div>
        <div>
            <img src="images/lemon-pie.jpg" alt="Lemon Pie" class="lemon-pie">
            <p>Lemon Pie</p>
        </div>
    </div>
</section>

<section id="contacto">
    <h2>Contacto</h2>
    <form id="contactForm">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="mensaje" placeholder="Mensaje" required></textarea>
        <button type="submit">Enviar</button>
    </form>
</section>

<footer>
    <p>&copy; 2025 MomPie Panadería. Todos los derechos reservados.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
